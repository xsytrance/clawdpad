<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clawdpad</title>
<script src="clawd-core.js"></script>
<style>
  :root { --bg:#171310; --card:#211b17; --border:#3a2f28; --coral:#D97757;
          --dim:#a89a8f; --ink:#efe6df; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--ink);
         font:16px/1.5 system-ui,sans-serif; max-width:560px;
         margin:0 auto; padding:28px 20px 40px; }
  header { display:flex; align-items:center; }
  h1 { color:var(--coral); font-size:34px; font-weight:900; flex:1; }
  #dot { width:14px; height:14px; border-radius:50%; background:#7a4a3a; }
  #status { color:var(--dim); font-size:14px; margin:6px 0 14px; min-height:1.4em; }
  .card { background:var(--card); border:2px solid var(--border);
          border-radius:24px; }
  #stage { display:flex; justify-content:center; padding:14px; margin-bottom:16px; }
  canvas { width:min(72vw,300px); height:min(72vw,300px);
           image-rendering:pixelated; }
  .cta { display:block; width:100%; border:none; background:var(--coral);
         color:var(--bg); font-size:17px; font-weight:600; padding:15px;
         border-radius:18px; cursor:pointer; margin-bottom:10px; }
  .cta.secondary { background:var(--card); color:var(--ink);
                   border:2px solid var(--border); }
  .cta:active { transform:scale(.97); }
  .label { color:var(--dim); font-size:12px; letter-spacing:.18em;
           margin:16px 0 8px 4px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .mood { background:var(--card); border:2px solid var(--border);
          border-radius:22px; padding:16px 0 12px; text-align:center;
          cursor:pointer; user-select:none; }
  .mood:active { transform:scale(.95); }
  .mood .e { font-size:30px; } .mood .l { font-size:14px; margin-top:4px; }
  #robe { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px;
          scrollbar-width:none; }
  .fit { flex:0 0 auto; background:var(--card); border:2px solid var(--border);
         border-radius:20px; padding:12px 16px 10px; text-align:center;
         cursor:pointer; user-select:none; }
  .fit:active { transform:scale(.95); }
  .fit.on { border-color:var(--coral); }
  .fit .e { font-size:26px; } .fit .l { font-size:12px; margin-top:3px; }
  footer { color:var(--dim); font-size:12px; text-align:center; margin-top:18px; }
  input { width:100%; padding:10px; margin:4px 0; background:var(--card);
          border:1px solid var(--border); border-radius:10px; color:var(--ink); }
  #remote { display:none; }
</style>
</head>
<body>
<header><h1>clawdpad</h1><div id="dot"></div></header>
<div id="status">the web brain — host over USB (Chrome/Edge) or drive a daemon</div>

<div class="card" id="stage"><canvas id="portrait" width="15" height="15"></canvas></div>

<button class="cta" id="hostBtn">🔌 host my block (WebMIDI)</button>
<button class="cta secondary" id="remoteBtn">🛰 drive a remote daemon</button>
<div id="remote">
  <input id="rUrl" value="http://127.0.0.1:8137" placeholder="daemon URL">
  <input id="rTok" type="password" placeholder="token (config.json)">
</div>

<div class="label">HIS MOODS</div>
<div class="grid" id="moods"></div>

<div class="label">THE CLAWDROBE</div>
<div id="robe"></div>

<footer>clawd-core.js · golden-tested against the reference stack ·
serve via <code>python3 -m http.server</code> for WebMIDI (needs
localhost/https)</footer>

<script>
"use strict";
const $ = id => document.getElementById(id);
const say = (msg, color) => {
  $("status").textContent = msg;
  if (color) $("dot").style.background = color;
};

/* ── portrait ─────────────────────────────────────────────────────── */
const ctx = $("portrait").getContext("2d");
let mode = "sleep";          // sleep | awake | dance
let mic = null, energy = 0, bounce = 0;
const t0 = performance.now();
let lastFrame = null;

function currentFrame() {
  const t = (performance.now() - t0) / 1000;
  if (mode === "dance") return Clawd.dance(t, energy, bounce);
  if (mode === "awake") return Clawd.awake(t);
  return Clawd.dressed(0.22, 0, 0, false, 0, t);
}
(function draw() {
  const f = currentFrame();
  lastFrame = f;
  const img = ctx.createImageData(15, 15);
  for (let p = 0; p < 225; p++) {
    const lit = f[p*3] + f[p*3+1] + f[p*3+2] > 12;
    img.data[p*4] = lit ? f[p*3] : 26;
    img.data[p*4+1] = lit ? f[p*3+1] : 21;
    img.data[p*4+2] = lit ? f[p*3+2] : 18;
    img.data[p*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  requestAnimationFrame(draw);
})();

/* ── WebMIDI host: the whole ROLI conversation, in a browser tab ──── */
let midiOut = null, host = null;

async function hostBlock() {
  if (!navigator.requestMIDIAccess) {
    say("this browser lacks WebMIDI — use Chrome/Edge, or remote mode", "#c25548");
    return;
  }
  try {
    const access = await navigator.requestMIDIAccess({ sysex: true });
    let inp = null, out = null;
    for (const o of access.outputs.values())
      if (/block|light/i.test(o.name)) out = o;
    for (const i of access.inputs.values())
      if (/block|light/i.test(i.name)) inp = i;
    if (!out) { say("no Lightpad on MIDI — plug it in via USB?", "#c25548"); return; }
    midiOut = out;
    say("handshake…", "#e0b23e");
    const send = p => out.send(p);
    send(Uint8Array.from(Protocol.SERIAL_DUMP_REQUEST));
    await sleep(600);
    send(PacketBuilder.requestTopology(0));
    await sleep(800);
    send(PacketBuilder.endApi(9)); await sleep(300);
    for (let i = 0; i < 6; i++) { send(PacketBuilder.beginApi(9)); await sleep(300); }
    // boot program then live-render forever
    const hs = new HeapStreamer(9, 1);
    const program = await fetch("program.bin").then(r => r.ok ? r.arrayBuffer() : null)
      .catch(() => null);
    if (!program) { say("program.bin missing — run tools/make_web_assets.py", "#c25548"); return; }
    hs.setBytes(0, new Uint8Array(program));
    for (const p of hs.drain()) send(p);
    mode = "awake";
    say("hosting over WebMIDI — he's alive in a browser tab", "#6fbf73");
    let lastPing = 0;
    host = setInterval(() => {
      const now = performance.now();
      if (now - lastPing > 300) { send(PacketBuilder.ping(9)); lastPing = now; }
      hs.setBytes(Protocol.PROGRAM_SIZE, Clawd.rgb565(lastFrame));
      for (const p of hs.drain()) send(p);
    }, 85);
  } catch (e) { say("WebMIDI refused: " + e.message, "#c25548"); }
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ── remote daemon mode ───────────────────────────────────────────── */
let remoteOn = false;
async function remoteCmd(body) {
  if (!remoteOn) return;
  try {
    await fetch($("rUrl").value, { method: "POST",
      headers: { "Authorization": "Bearer " + $("rTok").value,
                 "Content-Type": "application/json" },
      body: JSON.stringify(body) });
  } catch (e) { say("daemon unreachable: " + e.message, "#c25548"); }
}

/* ── moods & robe ─────────────────────────────────────────────────── */
const MOODS = [
  ["🐾", "big clawd", () => { mode = "awake"; remoteCmd({cmd:"size",arg:"full"}); }],
  ["🐜", "chibi", () => { mode = "awake"; remoteCmd({cmd:"size",arg:"mini"}); }],
  ["👋", "wave", () => remoteCmd({cmd:"say",arg:"hi",seconds:15})],
  ["🎉", "jump!", () => remoteCmd({cmd:"anim",arg:"celebrate"})],
  ["🔳", "QR code", () => remoteCmd({cmd:"qr",arg:"CLAWDPAD"})],
  ["🎵", "dance mode", toggleDance],
];
for (const [e, l, fn] of MOODS) {
  const d = document.createElement("div");
  d.className = "mood";
  d.innerHTML = `<div class="e">${e}</div><div class="l">${l}</div>`;
  d.onclick = fn;
  $("moods").appendChild(d);
}
for (const c of Clawd.COSTUMES) {
  const d = document.createElement("div");
  d.className = "fit" + (c.id === "none" ? " on" : "");
  d.innerHTML = `<div class="e">${c.emoji}</div><div class="l">${c.label}</div>`;
  d.onclick = () => {
    Clawd.costume = c.id;
    if (mode === "sleep") mode = "awake";
    document.querySelectorAll(".fit").forEach(x => x.classList.remove("on"));
    d.classList.add("on");
    say(c.id === "none" ? "back to his birthday suit"
        : `wearing: ${c.emoji} ${c.label}`);
  };
  $("robe").appendChild(d);
}

/* ── dance: mic → energy/beat, same recipe as the Android ears ────── */
async function toggleDance() {
  if (mic) {
    mic.stream.getTracks().forEach(t => t.stop());
    mic = null; mode = "awake";
    say("dance over — back to his life");
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ac = new AudioContext();
    const src = ac.createMediaStreamSource(stream);
    const an = ac.createAnalyser();
    an.fftSize = 512;
    src.connect(an);
    const buf = new Uint8Array(an.fftSize);
    let avg = 0.02, lastBeat = 0, lastTick = performance.now();
    mic = { stream, timer: setInterval(() => {
      an.getByteTimeDomainData(buf);
      let sum = 0;
      for (const b of buf) { const s = (b - 128) / 128; sum += s * s; }
      const rms = Math.sqrt(sum / buf.length);
      const now = performance.now();
      bounce = Math.max(0, bounce - (now - lastTick) / 1000 * 5.5);
      lastTick = now;
      energy = energy * 0.8 + Math.min(1, rms * 2.2) * 0.2;
      avg = avg * 0.985 + rms * 0.015;
      if (rms > avg * 1.35 && rms > 0.04 && now - lastBeat > 240) {
        lastBeat = now; bounce = 1;
      }
    }, 25) };
    mode = "dance";
    say("🎵 listening through the mic — play something with a beat");
  } catch (e) { say("mic refused: " + e.message, "#c25548"); }
}

$("hostBtn").onclick = hostBlock;
$("remoteBtn").onclick = () => {
  remoteOn = !remoteOn;
  $("remote").style.display = remoteOn ? "block" : "none";
  $("remoteBtn").textContent = remoteOn
    ? "🛰 remote mode ON — buttons drive the daemon"
    : "🛰 drive a remote daemon";
  if (remoteOn && mode === "sleep") mode = "awake";
};
</script>
</body>
</html>
